<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Team CRM</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="services.js"></script> 
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0f172a',
                            main: '#3b82f6',
                            accent: '#ef4444'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const SESSION_KEY = 'homeTeam_session_v6';
        const API_URL = 'http://localhost:3000/api';
        const AUTO_LOGOUT_TIME = 120 * 60 * 1000; 
        const hashPass = (p) => `hash_${p}`;
		// --- логін ---
        const LoginScreen = ({ onLogin, users }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState(''); 
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                const user = users.find(u => {
                    const isEmailMatch = u.email === email;
                    const isPasswordMatch = u.passwordHash === hashPass(password) || u.passwordHash === password;
                    return isEmailMatch && isPasswordMatch;
                });

                if (user) {
                    onLogin(user);
                } else {
                    setError("Невірні дані доступу");
                }
            };
            return (
                <div className="min-h-screen flex items-center justify-center bg-brand-dark p-6">
                    <div className="bg-white p-12 rounded-[50px] shadow-2xl w-full max-w-md fade-in text-center">
                        <div className="mb-8 inline-block p-5 bg-blue-50 rounded-[30px]">
                            <svg className="w-12 h-12 text-brand-main" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                            </svg>
                        </div>
                        <h1 className="text-4xl font-[900] text-gray-900 mb-2">Home<span className="text-brand-main">Team</span></h1>
                        <p className="text-gray-400 font-medium mb-10 uppercase text-xs tracking-[0.2em]">Система управління ЖК</p>
                        
                        <form onSubmit={handleSubmit} className="space-y-5">
                            {error && <div className="bg-red-50 text-red-500 p-4 rounded-2xl text-sm font-bold border border-red-100">{error}</div>}
                            <input 
                                type="email" value={email} onChange={e => setEmail(e.target.value)}
                                className="w-full bg-gray-50 border-2 border-transparent p-5 rounded-2xl focus:bg-white focus:border-brand-main outline-none transition-all font-bold text-gray-700"
                                placeholder="Email" required 
                            />
                            <input 
                                type="password" value={password} onChange={e => setPassword(e.target.value)}
                                className="w-full bg-gray-50 border-2 border-transparent p-5 rounded-2xl focus:bg-white focus:border-brand-main outline-none transition-all font-bold text-gray-700"
                                placeholder="Пароль" required 
                            />
                            <button className="w-full bg-brand-main text-white font-[900] py-5 rounded-2xl shadow-xl shadow-blue-200 hover:bg-blue-600 transition-all active:scale-95 text-lg">
                                Увійти в систему
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // ---СКЛАД---
       const InventoryView = ({ inventory, setInventory, addLog }) => {
    const [newItem, setNewItem] = React.useState({ item: '', quantity: 0, unit: 'шт' });

    const addItem = () => {
        if (!newItem.item) return;
        const updated = [...inventory, { ...newItem, id: Date.now(), min: 5 }];
        setInventory(updated);
        addLog('Склад', `Додано новий матеріал: ${newItem.item}`);
        setNewItem({ item: '', quantity: 0, unit: 'шт' });
    };

    const removeItem = (id, name) => {
        if (confirm(`Видалити ${name}?`)) {
            setInventory(inventory.filter(i => i.id !== id));
            addLog('Склад', `Видалено матеріал: ${name}`);
        }
    };

    const updateQty = (id, val) => {
        const updated = inventory.map(i => i.id === id ? { ...i, quantity: parseInt(val) || 0 } : i);
        setInventory(updated);
    };

    return (
        <div className="fade-in">
            <h2 className="text-2xl font-black mb-6">Склад матеріалів</h2>
            
            {/* Форма створення нового матеріалу */}
            <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-6 flex gap-4 items-end">
                <div className="flex-1">
                    <label className="text-[10px] font-black text-gray-400 uppercase ml-1">Назва матеріалу</label>
                    <input 
                        className="w-full border-2 border-gray-50 p-3 rounded-xl mt-1 outline-none focus:border-brand-main"
                        value={newItem.item}
                        onChange={e => setNewItem({...newItem, item: e.target.value})}
                        placeholder="Введіть назву..."
                    />
                </div>
                <div className="w-24">
                    <label className="text-[10px] font-black text-gray-400 uppercase ml-1">К-сть</label>
                    <input 
                        type="number"
                        className="w-full border-2 border-gray-50 p-3 rounded-xl mt-1 outline-none focus:border-brand-main"
                        value={newItem.quantity}
                        onChange={e => setNewItem({...newItem, quantity: e.target.value})}
                    />
                </div>
                <button onClick={addItem} className="bg-brand-main text-white px-6 py-3.5 rounded-xl font-black text-xs uppercase tracking-widest">Додати</button>
            </div>

            {/* Таблиця матеріалів */}
            <div className="bg-white rounded-[35px] shadow-sm border border-gray-100 overflow-hidden">
                <table className="w-full text-left">
                    <thead className="bg-gray-50 border-b border-gray-100">
                        <tr>
                            <th className="p-5 text-[10px] font-black uppercase text-gray-400">Назва</th>
                            <th className="p-5 text-[10px] font-black uppercase text-gray-400 text-center">Кількість</th>
                            <th className="p-5 text-[10px] font-black uppercase text-gray-400 text-right">Дії</th>
                        </tr>
                    </thead>
                    <tbody>
                        {inventory.map(item => (
                            <tr key={item.id} className="border-b border-gray-50 last:border-0 hover:bg-gray-50/50">
                                <td className="p-5 font-bold text-gray-800">{item.item}</td>
                                <td className="p-5 text-center">
                                    <div className="flex items-center justify-center gap-2">
                                        <input 
                                            type="number"
                                            className="w-20 border-2 border-gray-100 rounded-lg p-1 text-center font-black focus:border-brand-main outline-none"
                                            value={item.quantity}
                                            onChange={(e) => updateQty(item.id, e.target.value)}
                                        />
                                        <span className="text-[10px] font-bold text-gray-400 uppercase">{item.unit}</span>
                                    </div>
                                </td>
                                <td className="p-5 text-right">
                                    <button onClick={() => removeItem(item.id, item.item)} className="text-red-400 hover:text-red-600 font-bold p-2">✕</button>
                                </td>
                            </tr>
                        ))}
                    </tbody>
                </table>
            </div>
        </div>
    );
};

        // ---ПЕРСОНАЛ---
        const StaffView = ({ users, shifts, logs, createUser, deleteUser, onUpdateProfile, currentUser }) => {

    <button

        + Додати працівника
    </button>
)}
                    </div>

                    {/* СПИСОК ПРАЦІВНИКІВ */}
                    {staffTab === 'list' && (

                                                ✎

                                        {(currentUser.role === 'admin' && currentUser.id !== u.id) && (
                                            <button onClick={() => deleteUser(u.id)}

                                                title="Видалити"> ✕ </button>
                                        )}
                                    </div>
                                    <div className="flex items-center gap-5 mb-6">
                                        <img src={u.avatar || 'https://via.placeholder.com/150'} className="w-20 h-20 rounded-[30px] object-cover ring-4 ring-gray-50" />
                                        <div>
                                            <h4 className="font-[900] text-gray-900 text-lg leading-tight">{u.name}</h4>
                                            <div className="text-brand-main text-xs font-black uppercase tracking-widest mt-1">{u.role}</div>
                                        </div>
                                    </div>
                                    <div className="space-y-3 pt-4 border-t border-gray-50 text-sm font-bold text-gray-700">
                                        <p className="flex justify-between"><span className="text-gray-400 text-[10px] uppercase">Email:</span> {u.email}</p>
                                        <p className="flex justify-between"><span className="text-gray-400 text-[10px] uppercase">Телефон:</span> {u.phone || 'Не вказано'}</p>
										<p className="flex justify-between">
											<span className="text-gray-400 text-[10px] uppercase">День народження:</span> 
											{u.birthday ? new Date(u.birthday).toLocaleDateString('uk-UA') : 'Не вказано'}
										</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                   {/* МОДАЛЬНЕ ВІКНО СТВОРЕННЯ/РЕДАГУВАННЯ */}
                    {(showUserModal || editingUser) && (
                        <div className="fixed inset-0 bg-brand-dark/80 backdrop-blur-md flex items-center justify-center z-[110] p-6">
                            <div className="bg-white rounded-[40px] w-full max-w-md p-10 fade-in shadow-2xl">
                                <h2 className="text-2xl font-black mb-6 uppercase tracking-tight">
                                    {editingUser ? 'Редагувати дані' : 'Новий працівник'}
                                </h2>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    const userData = {
                                        id: editingUser ? editingUser.id : Date.now(),
                                        name: fd.get('name'),
                                        email: fd.get('email'),
                                        phone: fd.get('phone'),
                                        birthday: fd.get('birthday'), // Додаємо збір дати
                                        role: fd.get('role') || (editingUser ? editingUser.role : 'worker')
                                    };
                                    if (!editingUser) {
                                        userData.password = fd.get('pass');
                                        userData.avatar = null; 
                                        createUser(userData);
                                        setShowUserModal(false);
                                    } else {
                                        userData.avatar = editingUser.avatar; // Зберігаємо старий аватар
                                        onUpdateProfile(userData);
                                        setEditingUser(null);
                                    }
                                }} className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">ПІБ</label>
                                        <input name="name" defaultValue={editingUser?.name} placeholder="ПІБ" className="w-full p-4 bg-gray-50 rounded-2xl border-none font-bold" required />
                                    </div>

                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Дата народження</label>
                                        <input name="birthday" type="date" defaultValue={editingUser?.birthday} className="w-full p-4 bg-gray-50 rounded-2xl border-none font-bold" />
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Email</label>
                                            <input name="email" type="email" defaultValue={editingUser?.email} placeholder="Email" className="w-full p-4 bg-gray-50 rounded-2xl border-none font-bold" required />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Телефон</label>
                                            <input name="phone" defaultValue={editingUser?.phone} placeholder="Телефон" className="w-full p-4 bg-gray-50 rounded-2xl border-none font-bold" />
                                        </div>
                                    </div>

                                    {!editingUser && (
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Пароль</label>
                                            <input name="pass" type="password" placeholder="Пароль" className="w-full p-4 bg-gray-50 rounded-2xl border-none font-bold" required />
                                        </div>
                                    )}

<div className="space-y-1">
    <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Роль</label>
    {/* Додаємо перевірку на українську роль 'Адмін' та 'Директор' */}
    {(currentUser.role === 'admin' || currentUser.role === 'Адмін' || currentUser.role === 'Директор') ? (

            <option value="Директор">Директор</option>
            <option value="Менеджер">Менеджер</option>
            <option value="Виконроб">Виконроб</option>
            <option value="Електрик">Електрик</option>
            <option value="Сантехнік">Сантехнік</option>
            <option value="Прибиральник">Прибиральник(-ця)</option>
        </select>
    ) : (
        <div className="p-4 bg-gray-100 rounded-2xl text-gray-500 font-bold italic">
            {editingUser?.role || 'Працівник'}
            <input type="hidden" name="role" value={editingUser?.role || 'Працівник'} />
        </div>
    )}
</div>
                                    <div className="flex gap-3 pt-4">
                                        <button type="button" onClick={() => { setShowUserModal(false); setEditingUser(null); }} className="flex-1 py-4 font-black uppercase text-[10px] text-gray-400">Скасувати</button>
                                        <button type="submit" className="flex-1 bg-brand-main text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg active:scale-95 transition-all">
                                            {editingUser ? 'Зберегти' : 'Створити'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

{/* РОЗКЛАД ЧЕРГУВАНЬ (SHIFTS) */}
{staffTab === 'shifts' && (
    <div className="bg-white rounded-[25px] md:rounded-[40px] p-5 md:p-10 border border-gray-100 shadow-sm fade-in">
        <div className="flex justify-between items-center mb-6 md:mb-8">
            <h3 className="text-lg md:text-xl font-[1000] tracking-tight uppercase italic">Розклад чергувань</h3>
            
            <div className="flex items-center gap-4">
                <div className="bg-brand-main/10 text-brand-main px-4 py-2 rounded-xl text-[10px] font-black uppercase">
                    {shifts.length} змін
                </div>
                
                {/* КНОПКА ТІЛЬКИ ДЛЯ АДМІНА */}
                {currentUser?.role === 'admin' && (
                    <button 
                        onClick={() => window.dispatchEvent(new CustomEvent('openShiftModal'))}
                        className="bg-brand-main text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-blue-600 transition-all shadow-lg"
                    >
                        + Додати зміну
                    </button>
                )}
            </div>
        </div>

        <div className="table-container custom-scroll">
            <table className="w-full text-left min-w-[500px]">

                <tbody className="text-xs md:text-sm font-bold text-gray-700">

                                    <div className="flex items-center gap-3">
                                        <div className="w-8 h-8 bg-brand-main/10 rounded-lg flex items-center justify-center text-brand-main text-[10px]">
                                            {worker ? worker.name[0] : '?'}
                                        </div>
                                        <div>
                                            <div className="font-black text-gray-900">{worker ? worker.name : 'Невідомо'}</div>
                                            <div className="text-[9px] uppercase text-gray-400">{worker?.role}</div>

                                </td>
                                <td className="p-4 md:p-5 text-gray-500">

                                <td className="p-4 md:p-5">

                                    }`}>
                                        {shift.type === 'night' ? 'Нічна' : 'Денна'}
                                    </span>
                                </td>
                            </tr>
                        )
                    }) : (
                        <tr>
                            <td colSpan="4" className="p-12 text-center">
                                <div className="text-gray-300 font-black uppercase text-[10px] tracking-widest">Розклад порожній</div>
                            </td>
                        </tr>

                </tbody>
            </table>

    </div>
)}

                    {/* АУДИТ (LOGS) */}
                    {staffTab === 'audit' && (
                        <div className="bg-brand-dark rounded-[40px] p-10 shadow-2xl flex flex-col overflow-hidden max-h-[600px]">
                             <h3 className="text-xl font-black mb-8 tracking-tight text-white">Системний аудит</h3>
                             <div className="overflow-y-auto custom-scroll space-y-4 pr-2">
                                {logs.map(log => (
                                    <div key={log.id} className="bg-white/5 p-4 rounded-2xl border border-white/5 flex justify-between items-center">
                                        <div>
                                            <div className="text-white font-bold text-sm">{log.action}</div>
                                            <div className="text-gray-400 text-xs">{log.details}</div>

                                            <div className="text-brand-main text-xs font-black uppercase">{log.user}</div>

        };
   // --- ГОЛОВНИЙ ДОДАТОК ---
const App = () => {
    const [activeTab, setActiveTab] = useState('dashboard');
    const [showModal, setShowModal] = useState(false);
    
    // Стейти
    const [archiveTasks, setArchiveTasks] = useState([]);
    const [users, setUsers] = useState([]);
    const [tasks, setTasks] = useState([]);
    const [inventory, setInventory] = useState([]);
    const [shifts, setShifts] = useState([]);
    const [logs, setLogs] = useState([]);
    const [complexes, setComplexes] = useState([]);
    const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
    const [showShiftModal, setShowShiftModal] = useState(false);

    // ОДИН ЄДИНИЙ ЕФЕКТ ДЛЯ ЗАВАНТАЖЕННЯ
useEffect(() => {
    const loadData = async () => {
        try {
            const res = await fetch(`${API_URL}/data`);
            const data = await res.json();
            
            if (data) {
                // ПРИМУСОВО встановлюємо масиви, навіть якщо база віддала null
                setTasks(data.tasks || []);
                setInventory(data.inventory || []); // Матеріали
                setComplexes(data.complexes || []); // ЖК
                setUsers(data.users || []);         // Працівники
                setShifts(data.shifts || []);
                setLogs(data.logs || []);
                setArchiveTasks(data.archiveTasks || []);
                
                console.log("Дані завантажено успішно");
                console.table({
                    "Заявки": (data.tasks || []).length,
                    "Матеріали": (data.inventory || []).length,
                    "Працівники": (data.users || []).length,
                    "Об'єкти (ЖК)": (data.complexes || []).length
                });
